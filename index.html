<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convex Hull Simulator</title>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Convex Hull Simulator</h1>
        </div>

        <div class="sidebar-section">
          <label class="section-label">Algorithm</label>
          <select id="algo-select">
            <option value="jarvis">Jarvis March</option>
            <option value="graham">Graham Scan</option>
            <option value="monotone">Monotone Chain</option>
            <option value="sweep">Sweep Hull</option>
            <option value="brute">Brute Force</option>
            <option value="random">Random Incremental</option>
          </select>
        </div>

        <div class="sidebar-section">
          <label class="section-label">Controls</label>
          <div class="btn-grid">
            <button id="btn-compute" class="btn-accent">Compute</button>
            <button id="btn-toggle">Run</button>
            <button id="btn-random">Random</button>
            <button id="btn-clear">Clear</button>
          </div>
        </div>

        <div class="sidebar-section">
          <label class="section-label" for="speed-slider">Speed</label>
          <div class="speed-row">
            <input type="range" id="speed-slider" min="0" max="500" value="5" />
            <span id="speed-value">5ms</span>
          </div>
        </div>

        <div class="sidebar-section">
          <label class="section-label">Status</label>
          <div class="status-readout">
            <span id="step-counter">Step: 0</span>
            <span id="step-description">Click on canvas to add points.</span>
          </div>
        </div>
      </aside>

      <main class="canvas-area">
        <canvas id="canvas"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
